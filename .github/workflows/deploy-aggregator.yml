name: Deploy Aggregator to VPS

on:
  push:
    branches: [main]
    paths:
      - "aggregator/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            echo "==> Pull latest changes"
            git pull origin main

            echo "==> Update dependencies"
            cd aggregator
            [ -d .venv ] || python3 -m venv .venv
            .venv/bin/pip install -r requirements.txt

            echo "==> Restart aggregator (tmux)"
            tmux kill-session -t aggregator 2>/dev/null || true
            tmux new-session -d -s aggregator -c "$(pwd)" \
              "source .venv/bin/activate && python3 aggregator.py --mode=application"

            echo "==> Done"
